name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        shell: pwsh
        run: |
          uv run pytest -q 2>&1 | Tee-Object pytest.log
          if ($LASTEXITCODE -ne 0) {
            # Surface the failure tail as an annotation so it is readable
            # from the public API without downloading logs.
            $tail = (Get-Content pytest.log -Tail 40) -join "%0A"
            Write-Output "::error title=pytest failed::$tail"
            exit 1
          }

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/v*") {
            $v = $env:GITHUB_REF -replace "refs/tags/v", ""
          } else {
            $v = "0.0.0"
          }
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Generate icon
        run: uv run python build_assets/make_ico.py

      - name: Build app (PyInstaller)
        run: uv run pyinstaller airbridge.spec --noconfirm

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss /DAppVersion=${{ steps.version.outputs.version }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AirBridge-Setup
          path: dist/AirBridge-Setup-*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AirBridge-Setup-*.exe
          generate_release_notes: true
